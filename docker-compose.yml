services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${DB_USER:-avestra}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-avestra-Travel-Agency}
    volumes:
      - app_uploads:/var/www/html/Admin/images/uploads
      - app_user_uploads:/var/www/html/User/images/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${DB_NAME:-avestra-Travel-Agency}
      MYSQL_USER: ${DB_USER:-avestra}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  app_uploads:
  app_user_uploads:
