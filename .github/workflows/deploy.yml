name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/avestra-travel-agency:latest
            ghcr.io/${{ github.repository_owner }}/avestra-travel-agency:${{ github.sha }}

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: {}
    # Only run when SSH deploy secrets are configured
    if: ${{ vars.DEPLOY_HOST != '' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:     ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/avestra-travel-agency
            # Write .env from pre-exported variables; values are already
            # masked by GitHub Actions so they won't appear in plain logs.
            printenv DB_HOST DB_USER DB_PASSWORD DB_NAME DB_ROOT_PASSWORD \
                     SMTP_ENABLED SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS \
                     SMTP_FROM SMTP_FROM_NAME LOCAL_DEBUG_MODE \
              | awk 'NR==1{print "DB_HOST="$0}
                     NR==2{print "DB_USER="$0}
                     NR==3{print "DB_PASSWORD="$0}
                     NR==4{print "DB_NAME="$0}
                     NR==5{print "DB_ROOT_PASSWORD="$0}
                     NR==6{print "SMTP_ENABLED="$0}
                     NR==7{print "SMTP_HOST="$0}
                     NR==8{print "SMTP_PORT="$0}
                     NR==9{print "SMTP_USER="$0}
                     NR==10{print "SMTP_PASS="$0}
                     NR==11{print "SMTP_FROM="$0}
                     NR==12{print "SMTP_FROM_NAME="$0}
                     NR==13{print "LOCAL_DEBUG_MODE="$0}' > .env
            chmod 600 .env
            docker pull ghcr.io/${{ github.repository_owner }}/avestra-travel-agency:latest
            docker compose up -d --remove-orphans
        env:
          DB_HOST:           ${{ vars.DB_HOST }}
          DB_USER:           ${{ vars.DB_USER }}
          DB_PASSWORD:       ${{ secrets.DB_PASSWORD }}
          DB_NAME:           ${{ vars.DB_NAME }}
          DB_ROOT_PASSWORD:  ${{ secrets.DB_ROOT_PASSWORD }}
          SMTP_ENABLED:      ${{ vars.SMTP_ENABLED }}
          SMTP_HOST:         ${{ vars.SMTP_HOST }}
          SMTP_PORT:         ${{ vars.SMTP_PORT }}
          SMTP_USER:         ${{ vars.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          SMTP_FROM:         ${{ vars.SMTP_FROM }}
          SMTP_FROM_NAME:    ${{ vars.SMTP_FROM_NAME }}
          LOCAL_DEBUG_MODE:  ${{ vars.LOCAL_DEBUG_MODE }}
